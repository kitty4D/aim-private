<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AIM — Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180.png" />
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/98.css" />
  <link rel="stylesheet" href="/css/aim.css" />
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body class="chat-shell">
  <h1 class="sr-only">AIM chat</h1>
  <div class="app">
    <!-- Buddy List window -->
    <div class="window buddy-list">
      <div class="title-bar">
        <div class="title-bar-text">
          <span id="serverName">AIM</span> — Buddy List
        </div>
        <div class="title-bar-controls">
          <button aria-label="Minimize" disabled></button>
          <button aria-label="Maximize" disabled></button>
          <button type="button" id="signoffBtn" aria-label="Sign off" title="Sign off"></button>
        </div>
      </div>

      <div class="motd hidden" id="motd"></div>

      <div class="status-bar buddy-identity-strip" role="group" aria-label="Your account and presence">
        <div class="buddy-identity-id">
          <span class="buddy-identity-name">
            <span class="buddy-lcd">
              <span class="buddy-lcd-glass">
                <b id="meName" class="buddy-lcd-readout">…</b>
              </span>
            </span>
          </span>
          <span class="buddy-identity-role">(<span id="meRole">…</span>)</span>
        </div>
        <span class="spacer buddy-identity-spacer" aria-hidden="true"></span>
        <div class="buddy-identity-controls" role="group" aria-label="Status and sound">
          <button type="button" id="statusPill" class="status-pill" title="Cycle status: Available, Away, Invisible" aria-label="Your status is Available. Activate to change.">
            <span class="dot" style="background:#2ecc40" aria-hidden="true"></span>
            <span class="label">Available</span>
          </button>
          <button type="button" id="refreshBtn" title="Refresh buddies + rooms" aria-label="Refresh online buddies and rooms list">🔄</button>
          <button type="button" id="muteBtn" title="Toggle sound" aria-label="Sound on">🔊</button>
          <button type="button" id="adminBtn" class="hidden" title="Admin tools" aria-label="Admin tools">⚙️</button>
        </div>
      </div>

      <div class="window-body">
        <div class="buddy-section" id="onlineSection">
          <button type="button" class="buddy-section-header" id="onlineHeader" aria-expanded="true" aria-controls="onlineList">Online Buddies</button>
          <ul id="onlineList"></ul>
        </div>
        <div class="buddy-section" id="roomsSection">
          <div class="buddy-section-toolbar" id="roomsToolbar">
            <button type="button" class="buddy-section-header" id="roomsHeader" aria-expanded="true" aria-controls="roomList">Rooms</button>
          </div>
          <ul id="roomList"></ul>
        </div>
      </div>

      <div class="status-bar">
        <p class="status-bar-field">AIM v0.1.0</p>
        <p class="status-bar-field">Polling every 8s</p>
      </div>
    </div>

    <!-- Chat pane -->
    <div class="window chat-pane" id="chatPane">
      <div class="title-bar">
        <div class="title-bar-text">AIM</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize" disabled></button>
          <button aria-label="Maximize" disabled></button>
          <button aria-label="Close" disabled></button>
        </div>
      </div>
      <div class="window-body"></div>
    </div>
  </div>

  <script type="module">
    import { bootChat } from "/js/ui.js";
    bootChat();
  </script>
</body>
</html>
